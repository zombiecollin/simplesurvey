<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Survey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .question-number {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back {
            background: #e0e0e0;
            color: #333;
        }

        .btn-back:hover {
            background: #d0d0d0;
        }

        .btn-back:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-next, .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-next:hover, .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled, .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            text-align: center;
        }

        .results h2 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .results p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .result-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: left;
        }

        .result-question {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-answer {
            color: #667eea;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="survey" class="survey">
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
            
            <div class="question-number" id="questionNumber"></div>
            <h1 id="questionText"></h1>
            
            <div class="options" id="options"></div>
            
            <div class="buttons">
                <button class="btn-back" id="backBtn" onclick="previousQuestion()">Back</button>
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
                <button class="btn-submit hidden" id="submitBtn" onclick="submitSurvey()">Submit</button>
            </div>
        </div>

        <div id="results" class="results hidden">
            <h2>🎉 Survey Complete!</h2>
            <p>Thank you for completing the survey. Here are your responses:</p>
            <div id="resultsList"></div>
            <button class="btn-next" onclick="restartSurvey()" style="margin-top: 20px;">Start Over</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "What is your favorite type of music?",
                options: ["Rock", "Pop", "Jazz", "Classical", "Hip Hop", "Electronic"]
            },
            {
                question: "How often do you exercise?",
                options: ["Daily", "3-4 times a week", "1-2 times a week", "Rarely", "Never"]
            },
            {
                question: "What's your preferred way to relax?",
                options: ["Reading", "Watching TV/Movies", "Playing video games", "Outdoor activities", "Meditation"]
            },
            {
                question: "How do you prefer to communicate?",
                options: ["In person", "Phone calls", "Text messages", "Video calls", "Email"]
            },
            {
                question: "What's your ideal vacation?",
                options: ["Beach resort", "Mountain retreat", "City exploration", "Adventure travel", "Staycation"]
            }
        ];

        let currentQuestion = 0;
        let answers = {};

        function renderQuestion() {
            const question = questions[currentQuestion];
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            
            document.getElementById('progress').style.width = progress + '%';
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectOption(index);
                
                if (answers[currentQuestion] === index) {
                    optionDiv.classList.add('selected');
                }
                
                optionsContainer.appendChild(optionDiv);
            });
            
            // Update buttons
            document.getElementById('backBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = answers[currentQuestion] === undefined;
            
            // Show submit button on last question
            if (currentQuestion === questions.length - 1) {
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('submitBtn').classList.remove('hidden');
                document.getElementById('submitBtn').disabled = answers[currentQuestion] === undefined;
            } else {
                document.getElementById('nextBtn').classList.remove('hidden');
                document.getElementById('submitBtn').classList.add('hidden');
            }
        }

        function selectOption(index) {
            answers[currentQuestion] = index;
            renderQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function submitSurvey() {
            document.getElementById('survey').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';
            
            questions.forEach((question, index) => {
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                resultItem.innerHTML = `
                    <div class="result-question">${question.question}</div>
                    <div class="result-answer">${question.options[answers[index]]}</div>
                `;
                resultsList.appendChild(resultItem);
            });
        }

        function restartSurvey() {
            currentQuestion = 0;
            answers = {};
            document.getElementById('survey').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            renderQuestion();
        }

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
